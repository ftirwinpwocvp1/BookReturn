<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Return Submitted!</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      border-radius: 8px;
      padding: 50px 50px 44px 50px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .checkmark {
      width: 64px;
      height: 64px;
      background-color: #2ec4b6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
    }
    .checkmark svg {
      width: 34px;
      height: 34px;
      stroke: #ffffff;
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 22px;
      font-weight: bold;
      color: #111111;
      margin: 0 0 16px 0;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #333333;
      margin: 0 0 12px 0;
    }
    .signature {
      margin-top: 28px;
      font-size: 15px;
      line-height: 1.7;
      color: #333333;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Thank You!</h1>
    <p>Your book return has been submitted.</p>
  </div>
</body>
</html>
