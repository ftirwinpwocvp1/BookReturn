<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Submitting...</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .message {
      text-align: center;
      color: #555;
      font-size: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #2ec4b6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="message">
    <div class="spinner"></div>
    Submitting your return…
  </div>

  <script>
    // Try multiple methods to extract responseID
    function getResponseID() {
      // Method 1: URLSearchParams
      try {
        const p = new URLSearchParams(window.location.search);
        const v = p.get("responseID");
        if (v) return v;
      } catch(e) {}

      // Method 2: Manual parse of full href
      try {
        const href = window.location.href;
        const match = href.match(/[?&]responseID=([^&]+)/);
        if (match && match[1]) return decodeURIComponent(match[1]);
      } catch(e) {}

      return "";
    }

    const responseID = getResponseID();

    fetch("https://hooks.zapier.com/hooks/catch/27937169/43rjh7y/", {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ responseID: responseID })
    })
    .finally(function() {
      window.location.href = "https://ftirwinpwocvp1.github.io/BookReturn/";
    });
  </script>
</body>
</html>
